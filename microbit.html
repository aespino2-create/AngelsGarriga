<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competició per Grups</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f39c12;
            --danger: #e74c3c;
            --success: #2ecc71;
            --dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .hidden { display: none; }

        input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:active { transform: scale(0.95); }

        .btn-add { background-color: var(--primary); color: white; }
        .btn-next { background-color: var(--secondary); color: white; }
        .btn-finish { background-color: var(--danger); color: white; width: 100%; margin-top: 20px; }
        .btn-start { background-color: var(--success); color: white; font-size: 1.8rem; padding: 20px 40px; }

        #timer {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 25px 0;
            font-family: monospace;
            color: var(--dark);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 25px auto;
            max-width: 300px;
        }

        .dot {
            width: 45px;
            height: 45px;
            background-color: #eee;
            border: 2px solid #ddd;
            border-radius: 50%;
            cursor: pointer;
        }

        .dot.selected { background-color: var(--secondary); border-color: #d35400; }

        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .list-preview {
            text-align: left;
            font-size: 0.9rem;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-section">
        <h2 id="setup-title">Nom del Grup 1</h2>
        <input type="text" id="input-main" placeholder="Ex: Els Entremeliats">
        
        <div class="controls">
            <button id="btn-action" class="btn-add" onclick="handleLogic()">Afegir Grup</button>
            <button id="btn-next-group" class="hidden btn-next" onclick="prepareNextGroup()">Nou Grup</button>
        </div>

        <div id="preview-zone" class="list-preview hidden">
            <strong>Membres actuals:</strong>
            <ul id="member-list"></ul>
        </div>

        <button id="btn-final-start" class="hidden btn-finish" onclick="showStartScreen()">FINALITZAR I ANAR AL CRONO</button>
    </div>

    <div id="start-section" class="hidden">
        <h2>Tot a punt?</h2>
        <button class="btn-start" onclick="startTimer()">START</button>
    </div>

    <div id="timer-section" class="hidden">
        <h3 id="current-active-group">Competició en curs</h3>
        <div id="timer">00:00.00</div>
        <button class="btn-finish" onclick="showMatrix()">FINISH</button>
    </div>

    <div id="matrix-section" class="hidden">
        <h3>Patró de seguretat</h3>
        <p>Grup: <strong id="matrix-group-name"></strong></p>
        <div class="grid" id="matrix-grid"></div>
        <button class="btn-add" style="width:100%" onclick="validatePattern()">VERIFICAR</button>
    </div>

    <div id="result-section" class="hidden">
        <h2>Classificació</h2>
        <table id="leaderboard">
            <thead>
                <tr><th>Pos</th><th>Grup</th><th>Temps</th></tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
        <button class="btn-add" onclick="location.reload()">Nou Joc</button>
    </div>
</div>

<script>
    let groups = [];
    let currentTempGroup = { name: "", members: [] };
    let isNamingGroup = true;
    let currentGroupIndex = 0;
    
    let startTime;
    let timerInterval;
    let finalResults = [];

    // Patrons (0-24)
    const groupPatterns = [
        [0,1,2,3,4,5], [20,21,22,23,24,19], [2,7,12,17,22,11], [0,6,12,18,24,5]
    ];
    let selectedDots = [];

    function handleLogic() {
        const input = document.getElementById('input-main');
        const val = input.value.trim();
        if (!val) return;

        if (isNamingGroup) {
            currentTempGroup.name = val;
            isNamingGroup = false;
            input.value = "";
            input.placeholder = "Nom del membre";
            document.getElementById('setup-title').innerText = `Membres de: ${currentTempGroup.name}`;
            document.getElementById('btn-action').innerText = "Afegir Persona";
            document.getElementById('preview-zone').classList.remove('hidden');
        } else {
            currentTempGroup.members.push(val);
            const li = document.createElement('li');
            li.textContent = val;
            document.getElementById('member-list').appendChild(li);
            input.value = "";
            
            // Si hi ha almenys 2 persones, permetem canviar de grup o acabar
            if (currentTempGroup.members.length >= 2) {
                document.getElementById('btn-next-group').classList.remove('hidden');
                if (groups.length + 1 >= 2) {
                    document.getElementById('btn-final-start').classList.remove('hidden');
                }
            }
        }
    }

    function prepareNextGroup() {
        // Guardem el grup actual a la llista global
        groups.push({...currentTempGroup});
        
        // Reset per al nou grup
        currentTempGroup = { name: "", members: [] };
        isNamingGroup = true;
        
        document.getElementById('input-main').placeholder = "Nom del nou grup";
        document.getElementById('setup-title').innerText = `Nom del Grup ${groups.length + 1}`;
        document.getElementById('btn-action').innerText = "Afegir Grup";
        document.getElementById('member-list').innerHTML = "";
        document.getElementById('preview-zone').classList.add('hidden');
        document.getElementById('btn-next-group').classList.add('hidden');
        
        if (groups.length >= 2) {
            document.getElementById('btn-final-start').classList.remove('hidden');
        }
    }

    function showStartScreen() {
        // Si hi ha un grup a mitges, el guardem
        if (currentTempGroup.name && currentTempGroup.members.length >= 2) {
            groups.push({...currentTempGroup});
        }
        document.getElementById('setup-section').classList.add('hidden');
        document.getElementById('start-section').classList.remove('hidden');
    }

    function startTimer() {
        document.getElementById('start-section').classList.add('hidden');
        document.getElementById('timer-section').classList.remove('hidden');
        startTime = Date.now();
        timerInterval = setInterval(() => {
            document.getElementById('timer').innerText = formatTime(Date.now() - startTime);
        }, 10);
    }

    function formatTime(ms) {
        let d = new Date(ms);
        return d.getUTCMinutes().toString().padStart(2,'0') + ":" + 
               d.getUTCSeconds().toString().padStart(2,'0') + "." + 
               Math.floor(d.getUTCMilliseconds()/10).toString().padStart(2,'0');
    }

    function showMatrix() {
        document.getElementById('timer-section').classList.add('hidden');
        document.getElementById('matrix-section').classList.remove('hidden');
        document.getElementById('matrix-group-name').innerText = groups[currentGroupIndex].name;
        
        const grid = document.getElementById('matrix-grid');
        grid.innerHTML = "";
        selectedDots = [];
        for (let i = 0; i < 25; i++) {
            const d = document.createElement('div');
            d.classList.add('dot');
            d.onclick = () => {
                if (selectedDots.includes(i)) {
                    selectedDots = selectedDots.filter(x => x !== i);
                    d.classList.remove('selected');
                } else if (selectedDots.length < 6) {
                    selectedDots.push(i);
                    d.classList.add('selected');
                }
            };
            grid.appendChild(d);
        }
    }

    function validatePattern() {
        if (selectedDots.length !== 6) return alert("Tria 6 punts!");
        
        let pattern = groupPatterns[currentGroupIndex % groupPatterns.length];
        let correct = selectedDots.every(v => pattern.includes(v)) && selectedDots.length === pattern.length;

        if (correct) {
            groups[currentGroupIndex].time = Date.now() - startTime;
            finalResults.push(groups[currentGroupIndex]);
            currentGroupIndex++;

            if (currentGroupIndex < groups.length) {
                alert("Correcte!");
                document.getElementById('matrix-section').classList.add('hidden');
                document.getElementById('timer-section').classList.remove('hidden');
            } else {
                clearInterval(timerInterval);
                showFinalResults();
            }
        } else {
            alert("PATRÓ INCORRECTE");
            document.getElementById('matrix-section').classList.add('hidden');
            document.getElementById('timer-section').classList.remove('hidden');
        }
    }

    function showFinalResults() {
        document.getElementById('matrix-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');
        finalResults.sort((a,b) => a.time - b.time);
        const body = document.getElementById('leaderboard-body');
        finalResults.forEach((r, i) => {
            body.innerHTML += `<tr><td>${i+1}</td><td>${r.name}</td><td>${formatTime(r.time)}</td></tr>`;
        });
    }
</script>
</body>
</html>
